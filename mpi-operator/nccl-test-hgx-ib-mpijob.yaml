# NCCL all_reduce_perf on a standard 8-GPU HGX SKU over InfiniBand.
#
# Applies to any non-NVL HGX node with 8 GPUs + IB on the backend.
# Replace the nodeSelector value with the SKU you want to target,
# e.g. gd-8xh100ib-i128, gd-8xh200ib-i128, gd-8xb200ib-i128.
# Use the dedicated NVL examples for rack-scale GB200/GB300.
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-test-hgx-ib
spec:
  slotsPerWorker: 8
  runPolicy:
    cleanPodPolicy: Running
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          containers:
            - image: ghcr.io/coreweave/nccl-tests:12.9.1-devel-ubuntu22.04-nccl2.30.4-1-111c25a
              name: nccl
              env:
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
              # Uncomment to be able to exec in to launcher pod for interactive testing.
              # command: [ 'sleep', '86400' ]
              command: ["/bin/bash", "-c"]
              args: [
                  "mpirun \
                  -np 64 \
                  -bind-to none \
                  -x LD_LIBRARY_PATH \
                  -x NCCL_SOCKET_IFNAME=eth0 \
                  -x NCCL_IB_HCA=ibp \
                  -x UCX_TLS=tcp \
                  -x UCX_NET_DEVICES=eth0 \
                  -x OMPI_MCA_coll_hcoll_enable=0 \
                  -x NCCL_NET_PLUGIN=none \
                  /opt/nccl_tests/build/all_reduce_perf -b 512M -e 8G -f 2 -g 1
                  ",
                ]
              resources:
                requests:
                  cpu: 2
                  memory: 128Mi
    Worker:
      replicas: 8
      template:
        metadata:
          labels:
            metadata.coreweave.cloud/job: nccl-test
        spec:
          containers:
            - image: ghcr.io/coreweave/nccl-tests:12.9.1-devel-ubuntu22.04-nccl2.30.4-1-111c25a
              name: nccl
              resources:
                requests:
                  cpu: 110
                  memory: 960Gi
                  nvidia.com/gpu: 8
                  rdma/ib: 1
                limits:
                  memory: 960Gi
                  nvidia.com/gpu: 8
                  rdma/ib: 1
              volumeMounts:
                - mountPath: /dev/shm
                  name: dshm
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node.coreweave.cloud/type
                        operator: In
                        values:
                          # Replace with the SKU you want to target.
                          - gd-8xh100ib-i128
          volumes:
            - emptyDir:
                medium: Memory
              name: dshm
