# NCCL all_reduce_perf spanning multiple NVL72 racks over InfiniBand.
#
# As written, this spans 32 workers across 2 NVL72 racks (16 per rack).
# To grow the test, increase Worker.replicas and set
# .spec.mpiReplicaSpecs.Worker.template.spec.topologySpreadConstraints[0].minDomains
# to the number of racks you want to use.
#
# Applies to NVL72-style nodes with 4 GPUs per node connected by an
# external NVLink switch and IB on the backend (e.g., gb200-4x).
# Use the `-roce` variant for the RoCE-backed NVL SKUs.
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-test-nvl-ib-multirack
spec:
  slotsPerWorker: 4
  runPolicy:
    cleanPodPolicy: Running
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          containers:
            - image: ghcr.io/coreweave/nccl-tests:12.9.1-devel-ubuntu22.04-nccl2.30.4-1-111c25a
              name: nccl
              env:
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
              # Uncomment to be able to exec in to launcher pod for interactive testing.
              # command: [ 'sleep', '86400' ]
              command: ["/bin/bash", "-c"]
              args: [
                  "mpirun \
                  -bind-to none \
                  -x LD_LIBRARY_PATH \
                  -x NCCL_SOCKET_IFNAME=eth0 \
                  -x NCCL_IB_HCA=ibp \
                  -x NVIDIA_IMEX_CHANNELS=0 \
                  -x NCCL_NET_GDR_C2C=1 \
                  -x NCCL_MNNVL_ENABLE=1 \
                  -x NCCL_CUMEM_ENABLE=1 \
                  -x NCCL_SHM_DISABLE=0 \
                  -x UCX_TLS=tcp \
                  -x UCX_NET_DEVICES=eth0 \
                  -x OMPI_MCA_coll_hcoll_enable=0 \
                  -x NCCL_NET_PLUGIN=none \
                  /opt/nccl_tests/build/all_reduce_perf -b 512M -e 8G -f 2 -g 1
                  ",
                ]
              resources:
                requests:
                  cpu: 2
                  memory: 128Mi
    Worker:
      replicas: 32
      template:
        metadata:
          labels:
            metadata.coreweave.cloud/job: nccl-test
        spec:
          topologySpreadConstraints:
            # maxSkew 1 prevents uneven splits (e.g. 18 nodes on one rack and 14 on the other).
            # minDomains pins the minimum desired rack count: bump it as you grow
            # the replica count to keep workers spread across the intended racks.
            - maxSkew: 1
              minDomains: 2
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  metadata.coreweave.cloud/job: nccl-test
          containers:
            - image: ghcr.io/coreweave/nccl-tests:12.9.1-devel-ubuntu22.04-nccl2.30.4-1-111c25a
              name: nccl
              resources:
                requests:
                  cpu: "140"
                  memory: 900Gi
                  nvidia.com/gpu: 4
                limits:
                  cpu: "140"
                  memory: 900Gi
                  nvidia.com/gpu: 4
                  rdma/ib: 1
              volumeMounts:
                - mountPath: /dev/shm
                  name: dshm
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                # Cluster workers onto the minimum number of racks possible,
                # subject to the topologySpreadConstraints above.
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        metadata.coreweave.cloud/job: nccl-test
                    topologyKey: topology.kubernetes.io/zone
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node.coreweave.cloud/type
                        operator: In
                        values:
                          # Replace with the SKU you want to target.
                          - gb200-4x
                      # Uncomment and add values to target a specific set of NVL72 racks.
                      # - key: ds.coreweave.com/nvlink.domain
                      #   operator: In
                      #   values:
                      #     - <NVLINK_DOMAIN>
                      #     - <NVLINK_DOMAIN>
          volumes:
            - emptyDir:
                medium: Memory
              name: dshm
