# This assumes you have a single NVL72 rack in your cluster.
# If you have multiple, add an affinity to the workers for a specific rack/nvlink domain.
# This variant uses RoCE networking with the Spectrum-X NCCL plugin.
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-test-72-gb300-18n
spec:
  slotsPerWorker: 4
  runPolicy:
    cleanPodPolicy: Running
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          containers:
            - image: ghcr.io/coreweave/nccl-tests:13.1.0-devel-ubuntu22.04-nccl2.29.2-1-0bf62c2
              name: nccl
              env:
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
              # Uncomment to be able to exec in to launcher pod for interactive testing
              # command: [ 'sleep', '86400' ]
              command: ["/bin/bash", "-c"]
              args: [
                  "mpirun \
                  -bind-to none \
                  -x LD_LIBRARY_PATH=/opt/hpcx/nccl_spectrum-x_plugin/lib:$LD_LIBRARY_PATH \
                  -x NCCL_NET_PLUGIN=spcx \
                  -x NCCL_IB_NET_LATENCY=50 \
                  -x NCCL_IB_ADAPTIVE_ROUTING=1 \
                  -x NCCL_NVLS_NCHANNELS=24 \
                  -x NCCL_P2P_NET_CHUNKSIZE=524288 \
                  -x NCCL_NVLSTREE_MAX_CHUNKSIZE=262144 \
                  -x NCCL_NVLS_CHUNKSIZE=262144 \
                  -x NCCL_IB_ADDR_FAMILY=AF_INET6 \
                  -x NCCL_IB_ADDR_RANGE=fd02::/16 \
                  -x NCCL_IB_TC=96 \
                  -x NCCL_SOCKET_IFNAME=eth0 \
                  -x NCCL_IB_HCA=ibp \
                  -x UCX_TLS=tcp \
                  -x UCX_NET_DEVICES=eth0 \
                  -x OMPI_MCA_coll_hcoll_enable=0 \
                  /opt/nccl_tests/build/all_reduce_perf -b 512M -e 8G -f 2 -g 1
                  ",
                ]
              resources:
                requests:
                  cpu: 2
                  memory: 128Mi
    Worker:
      replicas: 18
      template:
        metadata:
          labels:
            metadata.coreweave.cloud/job: nccl-test
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name": "ibs0p0-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs0p1-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs0p2-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs0p3-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs1p0-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs1p1-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs1p2-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs1p3-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs2p0-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs2p1-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs2p2-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs2p3-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs3p0-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs3p1-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs3p2-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs3p3-macvlan",
                "namespace": "cw-multus"
              }]
        spec:
          containers:
            - image: ghcr.io/coreweave/nccl-tests:13.1.0-devel-ubuntu22.04-nccl2.29.2-1-0bf62c2
              name: nccl
              resources:
                requests:
                  cpu: "140"
                  memory: 900Gi
                  nvidia.com/gpu: 4
                limits:
                  cpu: "140"
                  memory: 900Gi
                  nvidia.com/gpu: 4
                  rdma/ib: 1
              volumeMounts:
                - mountPath: /dev/shm
                  name: dshm
          affinity:
            podAffinity:
              # This gives workers a preference to cluster together on the same rack
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        metadata.coreweave.cloud/job: nccl-test
                    topologyKey: topology.kubernetes.io/zone
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node.coreweave.cloud/type
                        operator: In
                        values:
                          - gb300-4x
                      # Uncomment and add a value if you want to target a specific NVL72 rack
                      # - key: ds.coreweave.com/nvlink.domain
                      #   operator: In
                      #   values:
                      #     - <NVLINK_DOMAIN>
          volumes:
            - emptyDir:
                medium: Memory
              name: dshm
