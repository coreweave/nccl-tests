# NCCL all_reduce_perf on a rack-scale NVL system over InfiniBand.
#
# Assumes a single NVL72 rack. For multi-rack runs see the
# `-multirack` variant. Applies to NVL72-style nodes with 4 GPUs
# per node connected by an external NVLink switch and IB on the
# backend (e.g., gb200-4x). Use the `-roce` variant for the
# RoCE-backed NVL SKUs.
#
# The podAffinity preference keeps all workers in the same NVLink
# domain (one rack). To pin to a specific rack, uncomment the
# nvlink.domain matchExpressions block.
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-test-nvl-ib
spec:
  slotsPerWorker: 4
  runPolicy:
    cleanPodPolicy: Running
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          containers:
            - image: ghcr.io/coreweave/nccl-tests:12.9.1-devel-ubuntu22.04-nccl2.30.4-1-111c25a
              name: nccl
              env:
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
              # Uncomment to be able to exec in to launcher pod for interactive testing.
              # command: [ 'sleep', '86400' ]
              command: ["/bin/bash", "-c"]
              args: [
                  "mpirun \
                  -bind-to none \
                  -x LD_LIBRARY_PATH \
                  -x NCCL_SOCKET_IFNAME=eth0 \
                  -x NCCL_IB_HCA=ibp \
                  -x NVIDIA_IMEX_CHANNELS=0 \
                  -x NCCL_NET_GDR_C2C=1 \
                  -x NCCL_MNNVL_ENABLE=1 \
                  -x NCCL_CUMEM_ENABLE=1 \
                  -x NCCL_SHM_DISABLE=0 \
                  -x UCX_TLS=tcp \
                  -x UCX_NET_DEVICES=eth0 \
                  -x OMPI_MCA_coll_hcoll_enable=0 \
                  -x NCCL_NET_PLUGIN=none \
                  /opt/nccl_tests/build/all_reduce_perf -b 512M -e 8G -f 2 -g 1
                  ",
                ]
              resources:
                requests:
                  cpu: 2
                  memory: 128Mi
    Worker:
      replicas: 18
      template:
        metadata:
          labels:
            metadata.coreweave.cloud/job: nccl-test
        spec:
          containers:
            - image: ghcr.io/coreweave/nccl-tests:12.9.1-devel-ubuntu22.04-nccl2.30.4-1-111c25a
              name: nccl
              resources:
                requests:
                  cpu: "140"
                  memory: 900Gi
                  nvidia.com/gpu: 4
                limits:
                  cpu: "140"
                  memory: 900Gi
                  nvidia.com/gpu: 4
                  rdma/ib: 1
              volumeMounts:
                - mountPath: /dev/shm
                  name: dshm
          affinity:
            podAffinity:
              # Prefer to cluster all workers together on the same rack.
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        metadata.coreweave.cloud/job: nccl-test
                    topologyKey: topology.kubernetes.io/zone
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node.coreweave.cloud/type
                        operator: In
                        values:
                          # Replace with the SKU you want to target.
                          - gb200-4x
                      # Uncomment and add a value if you want to target a specific NVL72 rack.
                      # - key: ds.coreweave.com/nvlink.domain
                      #   operator: In
                      #   values:
                      #     - <NVLINK_DOMAIN>
          volumes:
            - emptyDir:
                medium: Memory
              name: dshm
