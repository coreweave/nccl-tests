# NCCL all_reduce_perf spanning multiple NVL72 racks over RoCE (Spectrum-X),
# using Kubernetes DynamicResourceAllocation (DRA) for IMEX channels.
#
# As written, this spans 32 workers across 2 NVL72 racks (16 per rack).
# To grow the test, increase Worker.replicas and set
# .spec.mpiReplicaSpecs.Worker.template.spec.topologySpreadConstraints[0].minDomains
# to the number of racks you want to use.
#
# Requires the DRA Driver for NVIDIA GPUs and a correctly provisioned
# GPU Operator. Applies to NVL72-style nodes with 4 GPUs per node
# connected by an external NVLink switch and RoCE on the backend
# (e.g., gb300-4x, gb300-4x-e). Use the non-DRA multirack variant if
# your cluster does not yet have the DRA driver.
---
apiVersion: resource.nvidia.com/v1beta1
kind: ComputeDomain
metadata:
  name: nccl-test-nvl-roce-multirack-dra
  namespace: default
spec:
  numNodes: 0
  channel:
    resourceClaimTemplate:
      name: nccl-test-nvl-roce-multirack-dra-cd-channel
---
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-test-nvl-roce-multirack-dra
spec:
  slotsPerWorker: 4
  runPolicy:
    cleanPodPolicy: Running
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          containers:
            - image: ghcr.io/coreweave/nccl-tests:13.2.1-devel-ubuntu22.04-nccl2.30.4-1-111c25a
              name: nccl
              env:
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
              # Uncomment to be able to exec in to launcher pod for interactive testing.
              # command: [ 'sleep', '86400' ]
              command: ["/bin/bash", "-c"]
              # NCCL_NET_PLUGIN: switch to "spcx" for very large jobs (10k+ GPUs);
              # "none" is the better choice for smaller jobs.
              # https://docs.nvidia.com/networking/display/hpcvx225/spectrum-x-nccl-plugin
              args: [
                  "mpirun \
                  -bind-to none \
                  -x LD_LIBRARY_PATH=/opt/hpcx/nccl_spectrum-x_plugin/lib:$LD_LIBRARY_PATH \
                  -x NCCL_NET_PLUGIN=none \
                  -x NCCL_IB_NET_LATENCY=50 \
                  -x NCCL_IB_ADAPTIVE_ROUTING=1 \
                  -x NCCL_NVLS_NCHANNELS=24 \
                  -x NCCL_P2P_NET_CHUNKSIZE=524288 \
                  -x NCCL_NVLSTREE_MAX_CHUNKSIZE=262144 \
                  -x NCCL_NVLS_CHUNKSIZE=262144 \
                  -x NCCL_IB_ADDR_FAMILY=AF_INET6 \
                  -x NCCL_IB_ADDR_RANGE=fd02::/16 \
                  -x NCCL_IB_TC=96 \
                  -x NCCL_SOCKET_IFNAME=eth0 \
                  -x NCCL_IB_HCA=ibp \
                  -x UCX_TLS=tcp \
                  -x UCX_NET_DEVICES=eth0 \
                  -x OMPI_MCA_coll_hcoll_enable=0 \
                  /opt/nccl_tests/build/all_reduce_perf -b 512M -e 8G -f 2 -g 1
                  ",
                ]
              resources:
                requests:
                  cpu: 2
                  memory: 128Mi
    Worker:
      replicas: 32
      template:
        metadata:
          labels:
            metadata.coreweave.cloud/job: nccl-test
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name": "ibs0p0-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs0p1-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs0p2-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs0p3-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs1p0-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs1p1-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs1p2-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs1p3-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs2p0-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs2p1-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs2p2-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs2p3-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs3p0-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs3p1-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs3p2-macvlan",
                "namespace": "cw-multus"
              },{
                "name": "ibs3p3-macvlan",
                "namespace": "cw-multus"
              }]
        spec:
          topologySpreadConstraints:
            # maxSkew 1 prevents uneven splits (e.g. 18 nodes on one rack and 14 on the other).
            # minDomains pins the minimum desired rack count: bump it as you grow
            # the replica count to keep workers spread across the intended racks.
            - maxSkew: 1
              minDomains: 2
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  metadata.coreweave.cloud/job: nccl-test
          containers:
            - image: ghcr.io/coreweave/nccl-tests:13.2.1-devel-ubuntu22.04-nccl2.30.4-1-111c25a
              name: nccl
              resources:
                requests:
                  cpu: "140"
                  memory: 900Gi
                  nvidia.com/gpu: 4
                limits:
                  cpu: "140"
                  memory: 900Gi
                  nvidia.com/gpu: 4
                  rdma/ib: 1
                claims:
                  - name: compute-domain-channel
              volumeMounts:
                - mountPath: /dev/shm
                  name: dshm
          resourceClaims:
            - name: compute-domain-channel
              resourceClaimTemplateName: nccl-test-nvl-roce-multirack-dra-cd-channel
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                # Cluster workers onto the minimum number of racks possible,
                # subject to the topologySpreadConstraints above.
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        metadata.coreweave.cloud/job: nccl-test
                    topologyKey: topology.kubernetes.io/zone
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node.coreweave.cloud/type
                        operator: In
                        values:
                          # Replace with the SKU you want to target.
                          - gb300-4x
                          - gb300-4x-e
                      # Uncomment and add values to target a specific set of NVL72 racks.
                      # - key: ds.coreweave.com/nvlink.domain
                      #   operator: In
                      #   values:
                      #     - <NVLINK_DOMAIN>
                      #     - <NVLINK_DOMAIN>
          volumes:
            - emptyDir:
                medium: Memory
              name: dshm
